version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    ignore:
      # TypeScript 6 deprecated tsconfig `baseUrl`, which breaks tsup's
      # DTS build. Revisit when the migration is planned; in the
      # meantime stay on TS 5.x.
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # @types/node jumped 20 → 25 (skipping 4 majors) alongside TS 6
      # and is the other half of the same breaking-change bundle.
      # Stay in the LTS-aligned major for now.
      - dependency-name: "@types/node"
        versions: [">=21.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
